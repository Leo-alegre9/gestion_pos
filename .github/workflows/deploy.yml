name: Deploy Gestion POS to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      
name: SSH and deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e

            echo "🚀 Iniciando deploy de Gestion POS..."

            git config --global --add safe.directory /var/www/gestionpos.antinori.com.ar

            cd /var/www/gestionpos.antinori.com.ar

            # Traer últimos cambios
            git fetch --all
            git reset --hard origin/main

            # Permisos típicos para Apache
            chown -R www-data:www-data /var/www/gestionpos.antinori.com.ar
            find /var/www/gestionpos.antinori.com.ar -type d -exec chmod 755 {} ;
            find /var/www/gestionpos.antinori.com.ar -type f -exec chmod 644 {} ;

            # Ajuste para CodeIgniter (importante)
            if [ -d "writable" ]; then
              chmod -R 775 writable
              chown -R www-data:www-data writable
            fi

            # Recargar Apache
            systemctl reload apache2

            echo "✅ Deploy Gestion POS finalizado"
